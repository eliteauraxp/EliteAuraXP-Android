name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: unzip EliteAuraXP-Android.zip
      - name: Make gradlew executable
        run: chmod +x EliteAuraXP-Android/gradlew
      - name: Build APK
        run: cd EliteAuraXP-Android && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: EliteAuraXP-APK
          path: EliteAuraXP-Android/app/build/outputs/apk/debug/app-debug.apk
